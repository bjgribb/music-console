@if (variant() === 'compact') {
<article
  class="flex items-center gap-3 rounded-xl border border-[var(--app-border)] bg-[var(--app-surface-elevated)] p-2.5">
  <img [src]="track().album.images[0]?.url" [alt]="track().name + ' album artwork'"
    class="h-11 w-11 shrink-0 rounded-md object-cover" />
  <div class="min-w-0 flex-1">
    <h3 class="truncate text-sm font-semibold text-[var(--app-text)]">{{ track().name }}</h3>
    <p class="truncate text-xs text-[var(--app-text-muted)]">{{ artistNames() }}</p>
  </div>
  <button type="button" (click)="onSelectTrack()"
    class="h-8 shrink-0 rounded-md bg-[var(--app-primary)] px-3 text-xs font-semibold text-slate-950 transition disabled:cursor-not-allowed disabled:opacity-60 hover:bg-[var(--app-primary-hover)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--app-ring)]"
    [attr.aria-label]="'Select ' + track().name + ' as recommendation seed'">
    Select
  </button>
</article>
} @else {
<article
  class="overflow-hidden rounded-xl border border-[var(--app-border)] bg-[var(--app-surface-elevated)] shadow-lg shadow-black/25 transition hover:-translate-y-0.5 hover:shadow-xl">
  <div class="aspect-square w-full bg-black/10">
    <img [src]="track().album.images[0]?.url" [alt]="track().name + ' album artwork'"
      class="h-full w-full object-contain" />
  </div>

  <div class="p-4 space-y-1">
    <h3 class="line-clamp-2 leading-tight font-semibold text-[var(--app-text)]">{{ track().name }}</h3>
    <p class="line-clamp-1 text-sm text-[var(--app-text-muted)]">{{ artistNames() }}</p>
    <p class="line-clamp-1 text-xs uppercase tracking-wide text-[var(--app-text-muted)]">{{ track().album.name }}</p>

    <button type="button" (click)="onSelectTrack()"
      class="mt-3 h-10 w-full rounded-lg bg-[var(--app-primary)] px-3 font-semibold text-slate-950 transition disabled:cursor-not-allowed disabled:opacity-60 hover:bg-[var(--app-primary-hover)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--app-ring)]"
      [attr.aria-label]="'Select ' + track().name + ' as recommendation seed'">
      Select
    </button>
  </div>
</article>
}

<article class="rounded-2xl border border-[var(--app-border)] bg-[var(--app-surface)] p-6 md:p-8">
    <!-- Profile Header -->
    <div class="mb-6 flex flex-col items-start gap-4 sm:flex-row sm:items-center">
        @if (profile().imageUrl) {
        <img [src]="profile().imageUrl" [alt]="profile().displayName"
            class="h-16 w-16 rounded-full object-cover ring-2 ring-[var(--app-primary)]" width="64" height="64" />
        }
        <div>
            <p class="text-sm font-medium uppercase tracking-widest text-[var(--app-text-muted)]">Music Profile</p>
            <h1 class="text-2xl font-bold text-[var(--app-text)] md:text-3xl">{{ profile().displayName }}'s Wrapped</h1>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="mb-6 grid grid-cols-2 gap-4 sm:grid-cols-2">
        @if (profile().topArtists[0]; as topArtist) {
        <div class="rounded-xl bg-[var(--app-surface-elevated)] px-4 py-3">
            <p class="text-xs uppercase tracking-wider text-[var(--app-text-muted)]">Top Artist</p>
            <p class="mt-1 truncate font-semibold text-[var(--app-text)]">{{ topArtist.name }}</p>
        </div>
        }
        @if (profile().topTracks[0]; as topTrack) {
        <div class="rounded-xl bg-[var(--app-surface-elevated)] px-4 py-3">
            <p class="text-xs uppercase tracking-wider text-[var(--app-text-muted)]">Top Track</p>
            <p class="mt-1 truncate font-semibold text-[var(--app-text)]">{{ topTrack.name }}</p>
        </div>
        }
    </div>

    <!-- Actions -->
    <div class="flex flex-wrap gap-3">
        <button (click)="copyShareLink()"
            class="flex items-center gap-2 rounded-full bg-[var(--app-primary)] px-5 py-2 text-sm font-medium text-[var(--app-bg)] transition-colors hover:bg-[var(--app-primary-hover)]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                aria-hidden="true">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
                <polyline points="16 6 12 2 8 6" />
                <line x1="12" y1="2" x2="12" y2="15" />
            </svg>
            Copy Share Link
        </button>
        <button disabled
            class="flex items-center gap-2 rounded-full border border-[var(--app-border)] px-5 py-2 text-sm text-[var(--app-text-muted)] opacity-50 cursor-not-allowed"
            title="Coming soon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
            </svg>
            Export as Image
        </button>
    </div>
</article>

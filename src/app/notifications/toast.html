<section class="pointer-events-none fixed inset-x-0 top-3 z-50 px-3 md:top-4 md:px-6" aria-live="polite"
    aria-atomic="true">
    <div class="mx-auto flex w-full max-w-[1400px] flex-col gap-2">
        @if (notificationService.notification(); as notification) {
        <article class="pointer-events-auto rounded-lg border px-3 py-2.5 shadow-md backdrop-blur"
            [class.border-red-400/60]="notification.level === 'error'"
            [class.bg-red-950/85]="notification.level === 'error'"
            [class.border-emerald-400/60]="notification.level === 'success'"
            [class.bg-emerald-950/85]="notification.level === 'success'" role="status">
            <div class="min-w-0 flex-1">
                <p class="text-xs font-semibold uppercase tracking-wide text-white/70">{{ notification.level }}</p>
                <p class="text-sm text-white">{{ notification.message }}</p>
            </div>
        </article>
        }
    </div>
</section>
